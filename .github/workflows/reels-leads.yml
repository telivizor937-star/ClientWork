name: Reels lead agent

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 8 * * *"
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          missing = [name for name in ("TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID") if not os.getenv(name, "").strip()]
          if missing:
              raise SystemExit("Missing GitHub Actions config: " + ", ".join(missing))
          PY
          python run_agent.py

      - name: Save table
        run: |
          git config user.name "reels-lead-agent"
          git config user.email "actions@github.com"
          git add leads.csv last_run.txt
          git diff --cached --quiet || git commit -m "Update Reels leads"
          git push
