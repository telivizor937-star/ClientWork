name: Reels lead agent

on:
  workflow_dispatch:
    inputs:
      test_telegram:
        description: "Send a Telegram test message and exit"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: reels-lead-agent
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run agent
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_telegram == 'true') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || vars.OPENROUTER_API_KEY }}
        run: |
          python - <<'PY'
          import os
          missing = [name for name in ("TELEGRAM_BOT_TOKEN", "TELEGRAM_CHAT_ID") if not os.getenv(name, "").strip()]
          if missing:
              raise SystemExit("Missing GitHub Actions config: " + ", ".join(missing))
          PY
          python run_agent.py

      - name: Send Telegram test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || vars.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone
          import run_agent

          token = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.getenv("TELEGRAM_CHAT_ID", "").strip()
          missing = [name for name, value in (("TELEGRAM_BOT_TOKEN", token), ("TELEGRAM_CHAT_ID", chat_id)) if not value]
          if missing:
              raise SystemExit("Missing GitHub Actions config: " + ", ".join(missing))

          timestamp = datetime.now(timezone.utc).isoformat(timespec="seconds")
          run_agent.send_telegram_message(token, chat_id, f"\u0422\u0435\u0441\u0442 Telegram \u0438\u0437 GitHub Actions\n{timestamp}")
          print("Telegram test message sent")
          PY

      - name: Save runtime state
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.test_telegram == 'true') }}
        run: |
          git config user.name "reels-lead-agent"
          git config user.email "actions@github.com"
          git pull --rebase --autostash
          git add runtime_state.json sources.json discovered_sources.csv leads.csv last_run.txt
          if [ -f unavailable_channels.csv ]; then git add unavailable_channels.csv; fi
          git add daily_leads_*.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update bot runtime state"
          git push
